<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韋恩叫你健身App</title>
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg:       #0D0D0D;
      --s1:       #1A1A1A;
      --s2:       #242424;
      --s3:       #333333;
      --orange:   #FF6B00;
      --orange2:  #FF8C40;
      --text:     #FFFFFF;
      --text2:    #AAAAAA;
      --text3:    #666666;
      --green:    #30D158;
      --blue:     #0A84FF;
      --r-xl:     24px;
      --r-lg:     18px;
      --r-md:     14px;
      --r-sm:     10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang TC', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 捲軸 */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }

    /* 通用卡片 */
    .card {
      background: var(--s1);
      border-radius: var(--r-xl);
      padding: 1.1rem 1.2rem;
      margin-bottom: 0.85rem;
    }
    .card-title {
      color: var(--text2);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    /* 橙色主要按鈕 */
    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: white;
      border-radius: 999px;
      padding: 0.85rem;
      font-weight: 700;
      font-size: 0.95rem;
      width: 100%;
      cursor: pointer;
      border: none;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 20px rgba(255,107,0,0.35);
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }

    /* 次要按鈕 */
    .btn-secondary {
      background: var(--s3);
      color: var(--text2);
      border-radius: 999px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-secondary:active { background: #444; }

    /* 輸入框 */
    .input-field {
      width: 100%;
      border-radius: var(--r-md);
      padding: 0.65rem 0.9rem;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--s2);
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }
    .input-field:focus { outline: none; border-color: var(--orange); }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    select option { background: var(--s2); }

    /* 標籤 */
    .label {
      color: var(--text2);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
      margin-bottom: 0.4rem;
    }

    /* 橙色標籤 pill */
    .badge-orange {
      background: rgba(255,107,0,0.15);
      color: var(--orange);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }

    /* 大數字 */
    .big-num {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .med-num {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    /* 橙色漸層文字 */
    .text-orange-grad {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 進度條 */
    .progress-track {
      background: var(--s3);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--orange), var(--orange2));
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    canvas { max-width: 100%; display: block; }

    /* 底部導航 active pill */
    .nav-pill {
      position: absolute;
      bottom: 6px;
      width: 4px;
      height: 4px;
      background: var(--orange);
      border-radius: 999px;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>

<div id="app" style="max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">

  <!-- 頂部標題 -->
  <header id="main-header" style="padding:1rem 1.25rem 0.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;background:var(--bg);">
    <div>
      <div style="font-size:0.7rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;" id="header-date"></div>
      <div style="font-size:1.1rem;font-weight:800;color:var(--text);margin-top:1px;" id="header-greeting">韋恩叫你健身App</div>
    </div>
    <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FF6B00,#FF8C40);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 12px rgba(255,107,0,0.4);">💪</div>
  </header>

  <!-- 主要內容 -->
  <main style="flex:1;overflow-y:auto;padding:0.5rem 1.1rem;padding-bottom:5.5rem;">
    <div id="tab-dashboard" class="tab-content active"></div>
    <div id="tab-plan" class="tab-content"></div>
    <div id="tab-log" class="tab-content"></div>
    <div id="tab-profile" class="tab-content"></div>
  </main>

  <!-- 底部導航 -->
  <nav style="background:var(--s1);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;justify-content:space-around;padding:0.6rem 0 0.8rem;z-index:10;border-radius:24px 24px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.5);">
    <button onclick="switchTab('dashboard')" id="nav-dashboard" style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.65rem;font-weight:700;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 16px;position:relative;transition:color 0.2s;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>儀表板</span>
    </button>
    <button onclick="switchTab('plan')" id="nav-plan" style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.65rem;font-weight:700;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 16px;position:relative;transition:color 0.2s;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg><span>計畫</span>
    </button>
    <button onclick="switchTab('log')" id="nav-log" style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.65rem;font-weight:700;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 16px;position:relative;transition:color 0.2s;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg><span>記錄</span>
    </button>
    <button onclick="switchTab('profile')" id="nav-profile" style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.65rem;font-weight:700;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 16px;position:relative;transition:color 0.2s;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-3h4v3h-4zm4-4.5h-4c0-2.21 1.79-4 4-4V7l4 3.5L14 14v-2.5c-1.1 0-2 .9-2 2z"/></svg><span>資料</span>
    </button>
  </nav>

</div>

<script>
// =============================================
// 資料初始化 Data Init
// =============================================
const DEFAULTS = {
  profile: { name:'', age:'', gender:'male', height:'', weight:'', bodyFat:'', goalWeight:'', activityLevel:'moderate', fitnessGoal:'lose_fat' },
  workoutPlan: null,
  workoutLogs: [],  // [{date, exercises:[{name,sets:[{weight,reps,notes}]}], caloriesBurned, duration}]
  weightLogs: [],   // [{date, weight}]
  waterLogs: {},    // {date: count}
  currentTab: 'dashboard'
};

function loadData() {
  try { const s = localStorage.getItem('ft_v1'); if (s) return Object.assign({}, DEFAULTS, JSON.parse(s)); } catch(e) {}
  return Object.assign({}, DEFAULTS);
}
function saveData() { localStorage.setItem('ft_v1', JSON.stringify(app)); }

let app = loadData();

// 暫存當前記錄的組數
let _sets = [{ weight:'', reps:'', notes:'' }];
let _logDate = '';         // 當前記錄日期（空=今天）
let _selectedExName = '';  // 當前選擇的運動名稱
let _editDayIdx = -1;      // 計畫中正在編輯的日期 index

// =============================================
// 工具函數 Utilities
// =============================================
function today() { return new Date().toISOString().split('T')[0]; }

function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function getWeekDates() {
  const d = new Date(); const dow = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({length:7}, (_,i) => { const x = new Date(mon); x.setDate(mon.getDate()+i); return x.toISOString().split('T')[0]; });
}

// =============================================
// 健康計算 Health Calculations
// =============================================
function calcBMR(p) {
  if (!p.weight || !p.height || !p.age) return 0;
  const w=parseFloat(p.weight), h=parseFloat(p.height), a=parseInt(p.age);
  return Math.round(p.gender==='male' ? 10*w+6.25*h-5*a+5 : 10*w+6.25*h-5*a-161);
}

const ACT = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725 };

function calcTDEE(p) { return Math.round(calcBMR(p) * (ACT[p.activityLevel]||1.55)); }

function calcTarget(p) {
  const t = calcTDEE(p); if (!t) return 0;
  return t + (p.fitnessGoal==='build_muscle' ? 300 : p.fitnessGoal==='maintain' ? 0 : -500);
}

function calcWeeks(p) {
  const c=parseFloat(p.weight), g=parseFloat(p.goalWeight);
  if (!c||!g) return null;
  return Math.round(Math.abs(c-g) / (p.fitnessGoal==='build_muscle' ? 0.25 : 0.5));
}

// =============================================
// 運動資料庫 Exercise Database
// =============================================
const EX = {
  chest:    [{n:'臥推 Bench Press',met:5},{n:'上斜臥推 Incline Press',met:5},{n:'啞鈴飛鳥 DB Fly',met:5},{n:'伏地挺身 Push-up',met:8,bw:true},{n:'雙槓撐體 Dips',met:7,bw:true}],
  back:     [{n:'引體向上 Pull-up',met:8,bw:true},{n:'槓鈴划船 BB Row',met:5},{n:'坐姿划船 Seated Row',met:5},{n:'硬舉 Deadlift',met:6},{n:'滑輪下拉 Lat Pulldown',met:5}],
  legs:     [{n:'深蹲 Squat',met:6},{n:'腿推 Leg Press',met:5},{n:'弓步 Lunges',met:5},{n:'腿彎舉 Leg Curl',met:5},{n:'羅馬尼亞硬舉 RDL',met:5},{n:'小腿提踵 Calf Raise',met:4}],
  shoulders:[{n:'肩推 Shoulder Press',met:5},{n:'側平舉 Lateral Raise',met:4},{n:'前平舉 Front Raise',met:4},{n:'面拉 Face Pull',met:4},{n:'啞鈴肩推 DB Press',met:5}],
  arms:     [{n:'二頭彎舉 Bicep Curl',met:4},{n:'鎚式彎舉 Hammer Curl',met:4},{n:'集中彎舉 Concentration Curl',met:4},{n:'繩索下壓 Tricep Pushdown',met:4},{n:'三頭撐體 Tricep Dip',met:5,bw:true}],
  core:     [{n:'捲腹 Crunch',met:4,bw:true},{n:'棒式 Plank',met:4,bw:true},{n:'俄羅斯轉體 Russian Twist',met:4,bw:true},{n:'腿舉 Leg Raise',met:4,bw:true},{n:'登山式 Mountain Climber',met:8,bw:true}],
  cardio:   [{n:'慢跑 Jogging',met:7,bw:true},{n:'跳繩 Jump Rope',met:12,bw:true},{n:'HIIT訓練 HIIT',met:10,bw:true},{n:'騎腳踏車 Cycling',met:8,bw:true},{n:'快走 Brisk Walk',met:5,bw:true}]
};

function pickEx(muscle, count) {
  const pool = [...(EX[muscle]||EX.core)].sort(()=>Math.random()-0.5);
  return pool.slice(0, count).map(e => ({ name:e.n, met:e.met, bw:!!e.bw, sets:3, reps:muscle==='cardio'?20:12, weight:e.bw?0:20 }));
}

// =============================================
// 訓練計畫生成 Plan Generator
// =============================================
const PLAN_TEMPLATES = {
  lose_fat: [
    {day:'週一 Mon', focus:'全身訓練 Full Body', muscles:[['chest',2],['back',2],['legs',2]], rest:false},
    {day:'週二 Tue', focus:'有氧 Cardio', muscles:[['cardio',4]], rest:false},
    {day:'週三 Wed', focus:'上肢 Upper Body', muscles:[['chest',2],['back',2],['arms',2]], rest:false},
    {day:'週四 Thu', focus:'休息 Rest Day', muscles:[], rest:true},
    {day:'週五 Fri', focus:'下肢+核心 Lower+Core', muscles:[['legs',3],['core',2]], rest:false},
    {day:'週六 Sat', focus:'有氧+核心 Cardio+Core', muscles:[['cardio',3],['core',2]], rest:false},
    {day:'週日 Sun', focus:'休息 Rest Day', muscles:[], rest:true}
  ],
  build_muscle: [
    {day:'週一 Mon', focus:'胸+三頭 Chest+Tri', muscles:[['chest',3],['arms',2]], rest:false},
    {day:'週二 Tue', focus:'背+二頭 Back+Bi', muscles:[['back',3],['arms',2]], rest:false},
    {day:'週三 Wed', focus:'腿 Legs', muscles:[['legs',5]], rest:false},
    {day:'週四 Thu', focus:'休息 Rest Day', muscles:[], rest:true},
    {day:'週五 Fri', focus:'肩+核心 Shoulders+Core', muscles:[['shoulders',3],['core',2]], rest:false},
    {day:'週六 Sat', focus:'全身 Full Body', muscles:[['chest',2],['back',2],['legs',2]], rest:false},
    {day:'週日 Sun', focus:'休息 Rest Day', muscles:[], rest:true}
  ],
  maintain: [
    {day:'週一 Mon', focus:'上肢 Upper Body', muscles:[['chest',2],['back',2],['shoulders',1]], rest:false},
    {day:'週二 Tue', focus:'下肢 Lower Body', muscles:[['legs',5]], rest:false},
    {day:'週三 Wed', focus:'休息 Rest Day', muscles:[], rest:true},
    {day:'週四 Thu', focus:'手臂+核心 Arms+Core', muscles:[['arms',3],['core',2]], rest:false},
    {day:'週五 Fri', focus:'有氧+核心 Cardio+Core', muscles:[['cardio',3],['core',2]], rest:false},
    {day:'週六 Sat', focus:'全身 Full Body', muscles:[['chest',2],['back',2],['legs',2]], rest:false},
    {day:'週日 Sun', focus:'休息 Rest Day', muscles:[], rest:true}
  ]
};

function generatePlan(goal) {
  const tmpl = PLAN_TEMPLATES[goal] || PLAN_TEMPLATES.lose_fat;
  return tmpl.map(d => ({
    day: d.day, focus: d.focus, rest: d.rest,
    exercises: d.rest ? [] : d.muscles.flatMap(([m, cnt]) => pickEx(m, cnt))
  }));
}

// =============================================
// 導航切換 Tab Navigation
// =============================================
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => {
    el.style.color = 'var(--text3)';
  });
  document.getElementById('tab-' + name).classList.add('active');
  const activeBtn = document.getElementById('nav-' + name);
  if (activeBtn) activeBtn.style.color = 'var(--orange)';
  app.currentTab = name;
  if (name==='dashboard') renderDashboard();
  else if (name==='plan') renderPlan();
  else if (name==='log') renderLog();
  else if (name==='profile') renderProfile();
}

// =============================================
// 儀表板 Dashboard
// =============================================
function renderDashboard() {
  const p = app.profile;
  const t = today();
  const target = calcTarget(p);
  const todayLog = app.workoutLogs.find(l => l.date === t);
  const burned = todayLog ? (todayLog.caloriesBurned||0) : 0;
  const net = target ? target - burned : 0;
  const water = app.waterLogs[t] || 0;
  const lastW = app.weightLogs.length ? app.weightLogs[app.weightLogs.length-1].weight : (p.weight||'--');
  const wkDates = getWeekDates();
  const streak = wkDates.filter(d => app.workoutLogs.some(l => l.date===d && l.exercises.length>0)).length;
  const burnPct = target ? Math.min(Math.round(burned/target*100), 100) : 0;

  // 每天輪換 banner 圖（亞洲運動員）
  const BANNERS = [
    'https://images.pexels.com/photos/3768916/pexels-photo-3768916.jpeg',
    'https://images.pexels.com/photos/3837394/pexels-photo-3837394.jpeg',
    'https://images.pexels.com/photos/4162449/pexels-photo-4162449.jpeg',
    'https://images.pexels.com/photos/3768913/pexels-photo-3768913.jpeg',
    'https://images.pexels.com/photos/4498574/pexels-photo-4498574.jpeg',
    'https://images.pexels.com/photos/3757376/pexels-photo-3757376.jpeg',
    'https://images.pexels.com/photos/6455927/pexels-photo-6455927.jpeg',
  ];
  const bannerUrl = BANNERS[new Date().getDay()];
  const quotes = [
    '每一滴汗水都是進步的證明 💪',
    '今天的努力，是明天的成果 🔥',
    '堅持就是勝利 — Keep Going 🏆',
    '突破極限，超越自我 ⚡',
    '強大從不舒服的地方開始 💥',
    '你比你想像的更強 🌟',
    '休息是為了走更長遠的路 😤',
  ];
  const quote = quotes[new Date().getDay()];

  document.getElementById('tab-dashboard').innerHTML = `

    <!-- 動態 Banner 圖片 -->
    <div style="border-radius:var(--r-xl);overflow:hidden;margin-bottom:0.85rem;position:relative;height:160px;">
      <img src="${bannerUrl}?auto=compress&cs=tinysrgb&w=480&h=320&fit=crop&crop=faces,center"
        onerror="this.style.display='none'"
        style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.7) 100%);"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;padding:1rem 1.1rem;">
        <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.6);margin-bottom:3px;">今日格言</div>
        <div style="font-size:0.95rem;font-weight:700;color:white;line-height:1.3;">${quote}</div>
      </div>
    </div>

    <!-- 英雄卡片：燃燒熱量 -->
    <div style="background:linear-gradient(135deg,#FF6B00,#FF4500);border-radius:var(--r-xl);padding:1.4rem;margin-bottom:0.85rem;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.08);"></div>
      <div style="position:absolute;bottom:-30px;right:20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.06);"></div>
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.7);margin-bottom:0.4rem;">今日已燃燒 Burned</div>
      <div style="font-size:3.2rem;font-weight:900;color:white;line-height:1;letter-spacing:-0.03em;">${burned}<span style="font-size:1.1rem;font-weight:600;margin-left:4px;opacity:0.8;">kcal</span></div>
      ${target ? `
      <div style="margin-top:1rem;">
        <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:rgba(255,255,255,0.7);margin-bottom:6px;">
          <span>目標 ${target} kcal</span><span>${burnPct}%</span>
        </div>
        <div style="height:6px;background:rgba(255,255,255,0.25);border-radius:999px;">
          <div style="height:6px;background:white;border-radius:999px;width:${burnPct}%;transition:width 0.5s;"></div>
        </div>
      </div>` : `<div style="margin-top:0.75rem;font-size:0.75rem;color:rgba(255,255,255,0.6);">前往「資料」設定個人目標</div>`}
    </div>

    <!-- 三格數字卡 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:0.85rem;">

function quickWeight() {
  const v = parseFloat(document.getElementById('qw').value);
  if (!v||v<20||v>300) { alert('請輸入有效體重（20-300 kg）'); return; }
  const t = today();
  const idx = app.weightLogs.findIndex(l=>l.date===t);
  if (idx>=0) app.weightLogs[idx].weight=v; else app.weightLogs.push({date:t,weight:v});
  saveData(); renderDashboard();
}

// =============================================
// 折線圖 Line Chart (Canvas)
// =============================================
function drawLineChart(canvasId, data, field, color, unit) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || data.length < 2) return;
  const W = canvas.parentElement.clientWidth - 32 || 300;
  canvas.width = W; canvas.height = 150;
  const ctx = canvas.getContext('2d');

  const vals = data.map(d => d[field]);
  const minV = Math.min(...vals) - 1, maxV = Math.max(...vals) + 1;
  const pad = {t:10,r:15,b:25,l:42};
  const cW = W-pad.l-pad.r, cH = 150-pad.t-pad.b;

  ctx.clearRect(0,0,W,150);

  // 格線 + Y軸標籤
  ctx.strokeStyle='#334155'; ctx.lineWidth=0.5;
  for (let i=0;i<=4;i++) {
    const y = pad.t+(i/4)*cH;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText((maxV-(i/4)*(maxV-minV)).toFixed(1), pad.l-4, y+3);
  }

  // 折線
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
  data.forEach((d,i) => {
    const x=pad.l+(i/(data.length-1))*cW, y=pad.t+((maxV-d[field])/(maxV-minV))*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // 數據點
  data.forEach((d,i) => {
    const x=pad.l+(i/(data.length-1))*cW, y=pad.t+((maxV-d[field])/(maxV-minV))*cH;
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
  });

  // X軸首末標籤
  ctx.fillStyle='#94a3b8'; ctx.font='9px sans-serif';
  ctx.textAlign='center'; ctx.fillText(fmtDate(data[0].date), pad.l, 148);
  ctx.textAlign='center'; ctx.fillText(fmtDate(data[data.length-1].date), W-pad.r, 148);
}

function toggleDay(di) {
  const el = document.getElementById('pd'+di), ar = document.getElementById('arr'+di);
  if (!el) return;
  if (el.style.display==='none') { el.style.display='block'; if(ar) ar.style.transform='rotate(180deg)'; }
  else { el.style.display='none'; if(ar) ar.style.transform=''; }
}

// 調整本週目標天數
function changeGoalDays(delta) {
  const curr = app.profile.weeklyGoalDays || countPlannedDays();
  app.profile.weeklyGoalDays = Math.max(1, Math.min(7, curr + delta));
  saveData(); renderPlan();
}

// 切換休息日 ↔ 訓練日
function toggleRestDay(di) {
  const day = app.workoutPlan[di];
  day.rest = !day.rest;
  if (!day.rest && (!day.exercises || !day.exercises.length)) {
    day.exercises = pickEx('chest', 3);
    day.focus = '自訂訓練 Custom';
  }
  saveData(); renderPlan();
}

// 新增一個運動到計畫日
function addPlanEx(di) {
  if (!app.workoutPlan[di].exercises) app.workoutPlan[di].exercises = [];
  app.workoutPlan[di].exercises.push({ name:'深蹲 Squat', bw:false, sets:3, reps:12, weight:20 });
  saveData(); _editDayIdx = di; renderPlan();
}

// 移除計畫日中的某個運動
function removePlanEx(di, ei) {
  app.workoutPlan[di].exercises.splice(ei, 1);
  saveData(); _editDayIdx = di; renderPlan();
}

// 更新組數/次數/負重
function updatePlanEx(di, ei, field, val) {
  app.workoutPlan[di].exercises[ei][field] = parseFloat(val) || 0;
  saveData();
}

// 更換運動名稱（同步更新 bw 屬性）
function updatePlanExName(di, ei, name) {
  const info = Object.values(EX).flat().find(e => e.n === name);

  app.workoutPlan[di].exercises[ei].name = name;
  app.workoutPlan[di].exercises[ei].bw = !!info.bw;
  saveData(); _editDayIdx = di; renderPlan();

// 儲存編輯並退出編輯模式
function saveEditDay(di) {
  saveData(); _editDayIdx = -1; renderPlan();
}

function regenPlan() {
  if (confirm('確定重新生成訓練計畫？\n（自訂修改將會清除）')) {
    app.workoutPlan = generatePlan(app.profile.fitnessGoal||'lose_fat');

// 往前/往後切換日期
function shiftLogDate(delta) {
  const d = new Date((_logDate||today()) + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  const next = d.toISOString().split('T')[0];
  if (next <= today()) { _logDate = next; _selectedExName = ''; renderLog(); }
}

// 運動選擇器：分類展示
const EX_CATS = {
  '胸 Chest': EX.chest, '背 Back': EX.back, '腿 Legs': EX.legs,
  '肩 Shoulders': EX.shoulders, '手臂 Arms': EX.arms,
  '核心 Core': EX.core, '有氧 Cardio': EX.cardio
};

function openExPicker() {
  const m = document.getElementById('exPickerModal');
  m.style.display = 'flex';
  document.getElementById('exSearch').value = '';
  renderExPickerList('');
  setTimeout(() => document.getElementById('exSearch').focus(), 150);
}

function closeExPicker() {
  document.getElementById('exPickerModal').style.display = 'none';
  // 重新渲染按鈕文字
  const btn = document.querySelector('#tab-log button[onclick="openExPicker()"]');
  if (btn) {
    btn.children[0].textContent = _selectedExName || '點擊選擇運動 Tap to choose...';
    btn.children[0].style.color = _selectedExName ? 'white' : '#64748b';
  }
}

function filterExPicker(q) { renderExPickerList(q.toLowerCase()); }

function renderExPickerList(q) {
  const el = document.getElementById('exPickerList');
  if (!el) return;
  let html = '';
  Object.entries(EX_CATS).forEach(([cat, exs]) => {
    const list = exs.filter(e => !q || e.n.toLowerCase().includes(q));
    if (!list.length) return;
    html += `<div style="color:#f97316;font-size:0.7rem;font-weight:700;padding:0.6rem 0.25rem 0.25rem;letter-spacing:0.05em;">${cat}</div>`;
    list.forEach(e => {
      const sel = _selectedExName === e.n;
      html += `<button onclick="selectEx('${e.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'); closeExPicker()"
        style="display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;background:${sel?'#334155':'transparent'};border:none;border-radius:0.5rem;padding:0.65rem 0.75rem;color:${sel?'#f97316':'#cbd5e1'};cursor:pointer;font-size:0.9rem;margin-bottom:2px;">
        <span>${e.n}</span>
        <span style="font-size:0.65rem;color:#64748b;flex-shrink:0;margin-left:0.5rem;">${e.bw?'自重':'重量'}</span>
      </button>`;
    });
  });
  el.innerHTML = html || '<p style="color:#64748b;text-align:center;padding:1.5rem;">找不到符合運動</p>';
}

function selectEx(name) { _selectedExName = name; }

function renderSets() {
  const el = document.getElementById('setsWrap');
  if (!el) return;
  el.innerHTML = _sets.map((s,i) => `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
      <span style="color:#64748b;font-size:0.75rem;min-width:1.25rem;text-align:center;">${i+1}</span>
      <input type="number" placeholder="重量(kg)" value="${s.weight}" onchange="_sets[${i}].weight=this.value" class="input-field" style="flex:1;text-align:center;">
      <input type="number" placeholder="次數" value="${s.reps}" onchange="_sets[${i}].reps=this.value" class="input-field" style="flex:1;text-align:center;">
      <input type="text" placeholder="備註" value="${s.notes||''}" onchange="_sets[${i}].notes=this.value" class="input-field" style="flex:1.5;">
      ${_sets.length>1?`<button onclick="_sets.splice(${i},1);renderSets()" style="color:#f87171;background:none;border:none;cursor:pointer;padding:0 4px;">✕</button>`:'<div style="width:20px;"></div>'}
    </div>`).join('');
}

function addSet() { _sets.push({weight:'',reps:'',notes:''}); renderSets(); }

function saveEx() {
  const name = _selectedExName;
  if (!name) { alert('請先選擇運動名稱'); return; }
  const valid = _sets.filter(s => s.reps!=='');
  if (!valid.length) { alert('請至少輸入一組的次數'); return; }
  const t = _logDate || today();
  let lg = app.workoutLogs.find(l=>l.date===t);
  if (!lg) { lg = {date:t, exercises:[], caloriesBurned:0, duration:0}; app.workoutLogs.push(lg); }
  const exDb = Object.values(EX).flat();
  const info = exDb.find(e=>e.n===name)||{met:5};
  const bw = parseFloat(app.profile.weight)||70;
  const mins = valid.length * 2;
  const cal = Math.round(info.met * bw * mins / 60);
  const existing = lg.exercises.find(e=>e.name===name);
  if (existing) existing.sets.push(...valid.map(s=>({weight:s.weight||0,reps:s.reps,notes:s.notes||''})));
  else lg.exercises.push({name, sets: valid.map(s=>({weight:s.weight||0,reps:s.reps,notes:s.notes||''}))});
  lg.caloriesBurned = (lg.caloriesBurned||0) + cal;
  lg.duration = (lg.duration||0) + mins;
  saveData();
  _sets = [{weight:'',reps:'',notes:''}];
  _selectedExName = '';
  renderLog();
}

function delEx(i) {
  const t = _logDate || today();
  const lg = app.workoutLogs.find(l=>l.date===t);
  if (!lg) return;
  lg.exercises.splice(i,1);
  if (!lg.exercises.length) app.workoutLogs = app.workoutLogs.filter(l=>l.date!==t);
  saveData(); renderLog();
}

function renderHistory() {
  const recent = [...app.workoutLogs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  if (!recent.length) return '<p style="color:#64748b;font-size:0.875rem;text-align:center;">尚無記錄</p>';
  return recent.map(l => `
    <div style="background:#334155;border-radius:0.5rem;padding:0.5rem 0.75rem;margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
        <span style="color:white;font-size:0.8rem;font-weight:600;">${l.date}${l.date===today()?' (今天)':''}</span>
        <span style="color:#f97316;font-size:0.75rem;">🔥 ${l.caloriesBurned||0} kcal</span>
      </div>
      <div style="color:#94a3b8;font-size:0.7rem;">${l.exercises.map(e=>e.name.split(' ')[0]).join(' · ')}</div>
    </div>`).join('');
}

function getLoggedExNames() {
  const s = new Set();
  app.workoutLogs.forEach(l => l.exercises.forEach(e => s.add(e.name)));
  return [...s];
}

function drawExChart() {
  const sel = document.getElementById('exSel');
  if (!sel || !sel.value) return;
  const name = sel.value;
  const data = [];
  [...app.workoutLogs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(l => {
    const ex = l.exercises.find(e=>e.name===name);
    if (ex && ex.sets.length) {
      const maxW = Math.max(...ex.sets.map(s=>parseFloat(s.weight)||0));
      if (maxW>0) data.push({date:l.date, weight:maxW});
    }
  });
  if (data.length < 2) {
    const c = document.getElementById('exChart');
    if (!c) return;
    c.width = c.parentElement.clientWidth-32||300; c.height=80;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,80);
    ctx.fillStyle='#94a3b8'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('需至少2筆數據才能顯示圖表',c.width/2,44);
    return;
  }
  drawLineChart('exChart', data, 'weight', '#4ade80', 'kg');
}

        </div>`:''}
      </div>
    </div>` : ''}

    <!-- 資料表單 -->
    <div class="card">
      <div class="card-title">👤 個人資料 Profile Setup</div>

      <div style="margin-bottom:0.75rem;">
        <label class="label">姓名 Name</label>
        <input type="text" id="pName" value="${p.name||''}" placeholder="你的名字..." class="input-field">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
        <div>
          <label class="label">年齡 Age</label>
          <input type="number" id="pAge" value="${p.age||''}" placeholder="歲" class="input-field">
        </div>
        <div>
          <label class="label">性別 Gender</label>
          <select id="pGender" class="input-field">
            <option value="male" ${p.gender==='male'?'selected':''}>男 Male</option>
            <option value="female" ${p.gender==='female'?'selected':''}>女 Female</option>
          </select>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
        <div>
          <label class="label">身高 Height (cm)</label>
          <input type="number" id="pHeight" value="${p.height||''}" placeholder="cm" class="input-field">
        </div>
        <div>
          <label class="label">體重 Weight (kg)</label>
          <input type="number" id="pWeight" value="${p.weight||''}" placeholder="kg" step="0.1" class="input-field">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
        <div>
          <label class="label">體脂率 Body Fat %</label>
          <input type="number" id="pBF" value="${p.bodyFat||''}" placeholder="%" step="0.1" class="input-field">
        </div>
        <div>
          <label class="label">目標體重 Goal (kg)</label>
          <input type="number" id="pGoalW" value="${p.goalWeight||''}" placeholder="kg" step="0.1" class="input-field">
        </div>
      </div>

      <div style="margin-bottom:0.75rem;">
        <label class="label">活動量 Activity Level</label>
        <select id="pActivity" class="input-field">
          <option value="sedentary" ${p.activityLevel==='sedentary'?'selected':''}>久坐 Sedentary（辦公室、少動）</option>
          <option value="light"    ${p.activityLevel==='light'   ?'selected':''}>輕度 Lightly Active（每週1-3天）</option>
          <option value="moderate" ${p.activityLevel==='moderate'?'selected':''}>中度 Moderately Active（每週3-5天）</option>
          <option value="active"   ${p.activityLevel==='active'  ?'selected':''}>高度 Very Active（每週6-7天）</option>
        </select>
      </div>

      <div style="margin-bottom:1rem;">
        <label class="label">健身目標 Fitness Goal</label>
        <select id="pGoal" class="input-field">
          <option value="lose_fat"     ${p.fitnessGoal==='lose_fat'     ?'selected':''}>🔥 減脂 Lose Fat（熱量赤字 −500 kcal）</option>
          <option value="build_muscle" ${p.fitnessGoal==='build_muscle' ?'selected':''}>💪 增肌 Build Muscle（熱量盈餘 +300 kcal）</option>
          <option value="maintain"     ${p.fitnessGoal==='maintain'     ?'selected':''}>⚖️ 維持 Maintain（TDEE 等量）</option>
        </select>
      </div>

      <button onclick="saveProfile()" class="btn-primary" id="saveBtn">💾 儲存並計算 Save & Calculate</button>

      <button onclick="clearData()" style="width:100%;padding:0.5rem;background:none;border:1px solid #334155;color:#64748b;border-radius:0.5rem;margin-top:0.75rem;cursor:pointer;font-size:0.8rem;">
        🗑️ 清除所有資料 Clear All Data
      </button>
    </div>
  `;
}

function saveProfile() {
  const profile = {
    name:          document.getElementById('pName').value.trim(),
    age:           document.getElementById('pAge').value,
    gender:        document.getElementById('pGender').value,
    height:        document.getElementById('pHeight').value,
    weight:        document.getElementById('pWeight').value,
    bodyFat:       document.getElementById('pBF').value,
    goalWeight:    document.getElementById('pGoalW').value,
    activityLevel: document.getElementById('pActivity').value,
    fitnessGoal:   document.getElementById('pGoal').value
  };
  if (!profile.age || !profile.height || !profile.weight) { alert('請填寫年齡、身高、體重'); return; }
  app.profile = profile;
  if (!app.workoutPlan) app.workoutPlan = generatePlan(profile.fitnessGoal);
  saveData();
  renderProfile();
  const btn = document.getElementById('saveBtn');
  if (btn) { btn.textContent='✅ 已儲存！'; btn.style.background='#4ade80'; setTimeout(()=>{ btn.textContent='💾 儲存並計算 Save & Calculate'; btn.style.background='#f97316'; },2000); }
}

function clearData() {
  if (confirm('確定清除所有資料？此操作無法復原。')) {
    localStorage.removeItem('ft_v1');
    app = Object.assign({}, DEFAULTS);
    renderProfile();
  }
}

// =============================================
// 初始化 Init
// =============================================
function init() {
  // 頁頭日期與問候
  const d = new Date();
  const dateEl = document.getElementById('header-date');
  const greetEl = document.getElementById('header-greeting');
  if (dateEl) dateEl.textContent = d.toLocaleDateString('zh-TW',{weekday:'long',month:'long',day:'numeric'});
  const name = app.profile.name;
  const hr = d.getHours();
  const greet = hr < 12 ? '早安' : hr < 18 ? '午安' : '晚安';
  if (greetEl) greetEl.textContent = name ? `${greet}，${name} 👋` : '韋恩叫你健身App 💪';

  // 啟動預設 tab
  const start = app.currentTab || 'dashboard';
  document.getElementById('nav-'+start).style.color = 'var(--orange)';
  document.getElementById('tab-'+start).classList.add('active');
  if (start==='dashboard') renderDashboard();
  else if (start==='plan') renderPlan();
  else if (start==='log') renderLog();
  else if (start==='profile') renderProfile();
}

init();
</script>
</body>
</html>
